    // ================================================================
    // POOL COMPLETO - 180 PREGUNTAS (TODAS ENUMERADAS)
    // ================================================================

    const fullPool = [
        // Tectónica de placas (1-30)
        ...tectonicaPool.map((q, i) => ({ ...q, tema: 'tectonica' })),
        // Sismos (31-60)
        ...sismosPool.map((q, i) => ({ ...q, tema: 'sismos' })),
        // Volcanes (61-90)
        ...volcanesPool.map((q, i) => ({ ...q, tema: 'volcanes' })),
        // Tsunamis (91-120)
        ...tsunamisPool.map((q, i) => ({ ...q, tema: 'tsunamis' })),
        // Huracanes (121-150)
        ...huracanesPool.map((q, i) => ({ ...q, tema: 'huracanes' })),
        // Rocas (151-180)
        ...rocasPool.map((q, i) => ({ ...q, tema: 'rocas' }))
    ];

    // ================================================================
    // FUNCIONES DE SELECCIÓN Y EVALUACIÓN
    // ================================================================

    // Verificar que el pool tenga al menos 20 preguntas por tema
    function verificarPool() {
        const temas = ['tectonica', 'sismos', 'volcanes', 'tsunamis', 'huracanes', 'rocas'];
        const conteo = {};
        temas.forEach(t => conteo[t] = fullPool.filter(q => q.tema === t).length);
        console.log('Conteo de preguntas por tema:', conteo);
        // Todos deben tener al menos 20
        const ok = temas.every(t => conteo[t] >= 20);
        if (!ok) console.warn('¡Algún tema tiene menos de 20 preguntas!');
        return conteo;
    }
    verificarPool();

    function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function seleccionarPreguntas(pool, n) {
        // Asegurar al menos 20 preguntas por tema
        const temas = ['tectonica', 'sismos', 'volcanes', 'tsunamis', 'huracanes', 'rocas'];
        let seleccionadas = [];
        const porTema = 20; // 20 de cada tema = 120 preguntas

        temas.forEach(tema => {
            const poolTema = pool.filter(q => q.tema === tema);
            const seleccion = shuffleArray(poolTema).slice(0, porTema);
            seleccionadas = seleccionadas.concat(seleccion);
        });

        // Si necesitamos más preguntas, agregar aleatorias
        const restantes = n - seleccionadas.length;
        if (restantes > 0) {
            const poolRestante = pool.filter(q => !seleccionadas.includes(q));
            const adicionales = shuffleArray(poolRestante).slice(0, restantes);
            seleccionadas = seleccionadas.concat(adicionales);
        }

        // Mezclar y limitar a n
        return shuffleArray(seleccionadas).slice(0, n);
    }

    function getRandomQuestions() {
        return seleccionarPreguntas(fullPool, 50);
    }

    // ================================================================
    // RENDERIZADO Y EVALUACIÓN
    // ================================================================

    let currentQuestions = [];
    let userAnswers = [];
    let evaluated = false;

    function renderQuestions() {
        currentQuestions = getRandomQuestions();
        userAnswers = new Array(currentQuestions.length).fill(null);
        evaluated = false;

        const container = document.getElementById('examContent');
        container.innerHTML = '';

        currentQuestions.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'question-card';
            div.id = `q-${idx}`;

            const shuffledOptions = shuffleArray(q.options);

            div.innerHTML = `
                <div class="question-number">Pregunta ${idx + 1} de ${currentQuestions.length}</div>
                <div class="question-text">${q.text}</div>
                <div class="options">
                    ${shuffledOptions.map(opt => `
                        <label>
                            <input type="radio" name="q_${idx}" value="${opt}">
                            <span>${opt}</span>
                        </label>
                    `).join('')}
                </div>
                <div class="feedback-text" id="fb-${idx}"></div>
            `;

            container.appendChild(div);

            // Event listener para guardar respuesta
            const radios = div.querySelectorAll(`input[name="q_${idx}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (!evaluated) {
                        userAnswers[idx] = e.target.value;
                        actualizarContador();
                    }
                });
            });
        });

        document.getElementById('totalQuestions').textContent = currentQuestions.length;
        actualizarContador();
        document.getElementById('results').style.display = 'none';
        document.getElementById('evaluateBtn').disabled = false;
    }

    function actualizarContador() {
        const respondidas = userAnswers.filter(a => a !== null).length;
        document.getElementById('answeredCount').textContent = respondidas;
    }

    function evaluarTest() {
        if (evaluated) return;
        evaluated = true;

        let correctas = 0;
        const total = currentQuestions.length;

        currentQuestions.forEach((q, idx) => {
            const card = document.getElementById(`q-${idx}`);
            const fb = document.getElementById(`fb-${idx}`);
            const userAnswer = userAnswers[idx];
            const isCorrect = userAnswer === q.correct;

            if (isCorrect) {
                correctas++;
                card.classList.add('correct');
                fb.className = 'feedback-text show correct-fb';
                fb.innerHTML = '✅ Correcto';
            } else {
                card.classList.add('incorrect');
                fb.className = 'feedback-text show incorrect-fb';
                fb.innerHTML = `❌ Incorrecto. Respuesta correcta: <strong>${q.correct}</strong>`;
            }

            // Deshabilitar radios
            const radios = card.querySelectorAll('input[type="radio"]');
            radios.forEach(r => r.disabled = true);
        });

        const porcentaje = (correctas / total) * 100;
        let nota = 0;
        if (porcentaje >= 60) {
            nota = 4.0 + ((porcentaje - 60) / 40) * 3.0;
        } else {
            nota = 1.0 + (porcentaje / 60) * 3.0;
        }
        nota = Math.round(nota * 100) / 100;

        const aprobado = nota >= 4.0;

        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        resultsDiv.innerHTML = `
            <h3>📊 Resultados</h3>
            <div class="score">✅ Respuestas correctas: <span style="color:#63b3ed;">${correctas}</span> de ${total}</div>
            <div class="grade ${aprobado ? 'approved' : 'failed'}">
                ${aprobado ? '🎉 APROBADO 🎉' : '📖 REPROBADO 📖'}<br>
                <strong>NOTA FINAL: ${nota}</strong>
            </div>
            <div class="details">
                <span>📈 Porcentaje: ${Math.round(porcentaje)}%</span>
                <span>✅ Exigencia: 60%</span>
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary" id="restartBtn">🔄 Reiniciar Test</button>
                <button class="btn btn-secondary" id="backToClassBtn">📚 Volver a la Clase</button>
                <button class="btn btn-outline" id="backToCourseBtn">🏠 Volver al Curso</button>
            </div>
        `;

        document.getElementById('evaluateBtn').disabled = true;

        document.getElementById('restartBtn').addEventListener('click', restartTest);
        document.getElementById('backToClassBtn').addEventListener('click', () => {
            window.location.href = 'C_5_Fisica.html';
        });
        document.getElementById('backToCourseBtn').addEventListener('click', () => {
            window.location.href = 'Fisica.html';
        });

        resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function restartTest() {
        renderQuestions();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ================================================================
    // INICIALIZACIÓN
    // ================================================================

    renderQuestions();

    document.getElementById('evaluateBtn').addEventListener('click', evaluarTest);

    console.log('✅ Pool de preguntas cargado. Total:', fullPool.length);
    console.log('📊 Distribución por tema:');
    ['tectonica', 'sismos', 'volcanes', 'tsunamis', 'huracanes', 'rocas'].forEach(t => {
        const count = fullPool.filter(q => q.tema === t).length;
        console.log(`  ${t}: ${count} preguntas`);
    });
</script>
