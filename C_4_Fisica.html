        .section {

        .part-list li::before {

            position: absolute;

        }

        .evidence-list {
            list-style: none;
            padding-left: 0;
        }

        .evidence-list li {
            margin: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
        }

        .evidence-list li::before {
            content: "🔬";
            position: absolute;
            left: 0;
        }

        .nav-circles {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;

        }

        .circle {

            border-radius: 50%;

        }

        .circle:hover {
            transform: scale(1.1);
            border-color: #ff914d;
        }

        .circle.active {
            background: #ff914d;
            color: white;
            border-color: #ff914d;
            box-shadow: 0 0 10px rgba(255, 145, 77, 0.5);
        }

        .slide-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            gap: 1rem;
        }

        .nav-arrow-btn {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-arrow-btn:hover {

        .fixed-footer {

        .footer-btn {

            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;

        .footer-btn:hover {
            background: #3a7a8e;
            transform: scale(1.02);
        }

        .footer-btn.primary {
            background: #ff6b35;
        }

        .footer-btn.primary:hover {
            background: #ff914d;
        }

        @media (max-width: 700px) {
            body {
                padding: 1rem 1rem 80px 1rem;
            }
            .container {

            }
            .section-title {
                font-size: 1.2rem;
            }

            }
            .circle {
                width: 32px;
                height: 32px;

            }
            .footer-btn {
                padding: 0.4rem 1.2rem;
                font-size: 0.85rem;
            }
            .grid-3 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<script>
    // ==================== DEFINICIÓN DE LAS SLIDES ====================
    const slides = [
        { // Slide 0 - Introducción
            title: "🌋 Introducción a Sismos y Volcanes",
            content: `
                <p>Los <strong class="highlight">sismos</strong> y <strong class="highlight">volcanes</strong> son fenómenos geológicos que ocurren como consecuencia de la <strong class="highlight">dinámica interna de la Tierra</strong>. Ambos están estrechamente relacionados con el movimiento de las <strong>placas tectónicas</strong>.</p>
                
                <div class="subsection">
                    <div class="subsection-title">🌍 Relación con la Tectónica de Placas</div>
                    <p>La mayoría de los sismos y volcanes del mundo ocurren en los <strong>límites de las placas tectónicas</strong>. En estos bordes, las placas interactúan de diferentes maneras:</p>
                    <ul style="margin: 0.8rem 0 0 1.5rem;">
                        <li><strong>Límites convergentes:</strong> Una placa se subduce bajo otra, generando sismos y volcanes.</li>
                        <li><strong>Límites divergentes:</strong> Las placas se separan, permitiendo el ascenso de magma.</li>
                        <li><strong>Límites transformantes:</strong> Las placas se deslizan lateralmente, generando sismos.</li>
                    </ul>
                </div>

                <div class="subsection">
                    <div class="subsection-title">🔥 El Cinturón de Fuego del Pacífico</div>
                    <div class="concept-box">
                        <p>El <strong class="highlight">Cinturón de Fuego del Pacífico</strong> es una región con forma de herradura que rodea el Océano Pacífico. Concentra aproximadamente el <strong class="highlight">90% de los sismos</strong> y el <strong class="highlight">75% de los volcanes activos</strong> del mundo.</p>
                        <p style="margin-top: 0.5rem;">Chile se encuentra en esta zona, lo que explica la alta actividad sísmica y volcánica del país.</p>
                    </div>
                </div>
            `
        },
        { // Slide 1 - Sismos: Definición y Causas
            title: "🔬 Sismos: Definición y Causas",
            content: `
                <p>Un <strong class="highlight">sismo</strong> o <strong>terremoto</strong> es un movimiento brusco de la corteza terrestre causado por la liberación repentina de energía acumulada en el interior de la Tierra.</p>

                <div class="subsection">
                    <div class="subsection-title">⚡ Causas de los Sismos</div>
                    <ul style="margin: 0.8rem 0 0 1.5rem;">
                        <li><strong>Movimiento de placas tectónicas:</strong> La principal causa. La fricción entre placas acumula energía que se libera en forma de ondas sísmicas.</li>
                        <li><strong>Actividad volcánica:</strong> El movimiento del magma puede generar sismos de menor magnitud.</li>
                        <li><strong>Actividad humana:</strong> Explosiones, minería, o construcción de grandes embalses pueden generar sismos inducidos.</li>
                    </ul>
                </div>

                <div class="subsection">
                    <div class="subsection-title">📐 Conceptos Clave</div>
                    <div class="grid-2">
                        <div class="card">
                            <h4>📍 Hipocentro</h4>
                            <p>Punto en el <strong>interior de la Tierra</strong> donde se origina el sismo. También llamado <strong>foco</strong>.</p>
                        </div>
                        <div class="card">
                            <h4>📍 Epicentro</h4>
                            <p>Punto en la <strong>superficie</strong> directamente sobre el hipocentro. Es donde se siente con mayor intensidad.</p>
                        </div>
                    </div>
                </div>

                <div class="subsection">
                    <div class="subsection-title">🌊 Zona de Subducción y Zona de Benioff</div>
                    <div class="concept-box">
                        <p>La <strong class="highlight">zona de subducción</strong> es el lugar donde una placa oceánica se hunde bajo otra placa (continental u oceánica).</p>
                        <p style="margin-top: 0.5rem;">La <strong class="highlight">zona de Benioff</strong> es la región de fricción entre las placas en subducción. En esta zona se generan la mayoría de los sismos profundos y de gran magnitud.</p>
                    </div>
                </div>

                <div class="subsection">
                    <div class="subsection-title">📊 Tipos de Sismos según su Ubicación</div>
                    <div class="grid-2">
                        <div class="card">
                            <h4>🔴 Sismo Interplaca</h4>
                            <p>Ocurre en el <strong>límite entre dos placas</strong> tectónicas. Son los más comunes y de mayor magnitud.</p>
                        </div>
                        <div class="card">
                            <h4>🟠 Sismo Intraplaca</h4>
                            <p>Ocurre en el <strong>interior de una placa</strong>, generalmente por fallas locales. Pueden ser de gran magnitud.</p>
                        </div>
                    </div>
                </div>
            `
        },
        { // Slide 2 - Ondas Sísmicas
            title: "📊 Ondas Sísmicas",
            content: `
                <p>Los sismos generan <strong class="highlight">ondas sísmicas</strong> que se propagan por el interior y la superficie de la Tierra. Estas ondas son registradas por los <strong>sismógrafos</strong>.</p>

                <div class="subsection">
                    <div class="subsection-title">📡 Tipos de Ondas Sísmicas</div>
                    <table>
                        <thead>
                            <tr>
                                <th>Tipo de Onda</th>
                                <th>Características</th>
                                <th>Velocidad</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><strong>Ondas P</strong> <br> (Primarias)</td>
                                <td>Son las más rápidas. Viajan comprimiendo y expandiendo el material (movimiento en la dirección de propagación). Pueden atravesar <strong>sólidos, líquidos y gases</strong>.</td>
                                <td>Más rápidas</td>
                            </tr>
                            <tr>
                                <td><strong>Ondas S</strong> <br> (Secundarias)</td>
                                <td>Viajan con movimiento perpendicular a la dirección de propagación. Solo pueden atravesar <strong>sólidos</strong>. No pueden atravesar el núcleo externo líquido.</td>
                                <td>Más lentas que las P</td>
                            </tr>
                            <tr>
                                <td><strong>Ondas Superficiales</strong> <br> (Love y Rayleigh)</td>
                                <td>Viajan por la <strong>superficie</strong> terrestre. Son las <strong>más destructivas</strong> porque generan movimientos horizontales y verticales.</td>
                                <td>Las más lentas</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="subsection">
                    <div class="subsection-title">🔍 Sombra Sísmica</div>
                    <div class="concept-box">
                        <p>Las <strong>ondas S no pueden atravesar el núcleo externo líquido</strong> de la Tierra. Esto genera una <strong class="highlight">sombra sísmica</strong>, una zona donde no se registran ondas S, lo que permitió a los científicos descubrir que el núcleo externo es líquido.</p>
                    </div>
                </div>

                <div class="subsection">
                    <div class="subsection-title">📏 Cálculo de la Distancia al Epicentro</div>
                    <div class="concept-box">
                        <p>Los sismógrafos registran el <strong>tiempo de llegada de las ondas P y S</strong>. La <strong>diferencia de tiempo</strong> entre ambas permite calcular la <strong>distancia al epicentro</strong> del sismo.</p>
                        <p style="margin-top: 0.5rem;">💡 <strong>Importante:</strong> A mayor diferencia de tiempo, mayor es la distancia al epicentro.</p>
                    </div>
                </div>
            `
        },
        { // Slide 3 - Escalas Sísmicas
            title: "📏 Escalas Sísmicas",
            content: `
                <p>Existen dos escalas principales para medir y clasificar los sismos: la <strong class="highlight">escala de Richter</strong> y la <strong class="highlight">escala de Mercalli</strong>. Ambas miden aspectos diferentes del fenómeno.</p>

                <div class="subsection">
                    <div class="subsection-title">📊 Escala de Richter (Magnitud)</div>
                    <div class="concept-box">
                        <p>Mide la <strong>energía liberada</strong> en el foco del sismo. Es una escala <strong>logarítmica</strong>.</p>
                        <ul style="margin: 0.8rem 0 0 1.5rem;">
                            <li><strong>Cada unidad</strong> en la escala representa un aumento de <strong>10 veces</strong> en la amplitud de las ondas.</li>
                            <li><strong>La energía</strong> aumenta <strong>32 veces</strong> por cada unidad.</li>
                            <li>Se calcula con el <strong>sismógrafo</strong> y es objetiva (no depende de la percepción humana).</li>
                            <li>No tiene límite superior, pero los sismos más grandes registrados son de magnitud ~9.5.</li>
                        </ul>
                    </div>
                </div>

                <div class="subsection">
                    <div class="subsection-title">🌍 Escala de Mercalli (Intensidad)</div>
                    <div class="concept-box">
                        <p>Mide los <strong>efectos y daños</strong> del sismo en la superficie. Es una escala <strong>subjetiva</strong> basada en la percepción humana y los daños materiales.</p>
                        <ul style="margin: 0.8rem 0 0 1.5rem;">
                            <li>Va de <strong>I</strong> (no perceptible) a <strong>XII</strong> (destrucción total).</li>
                            <li>Depende de la <strong>distancia al epicentro</strong>, el tipo de suelo y la construcción de edificios.</li>
                            <li>Es útil para evaluar el <strong>impacto real</strong> del sismo en una zona.</li>
                        </ul>
                    </div>
                </div>

                <div class="subsection">
                    <div class="subsection-title">⚖️ Diferencias Clave</div>
                    <table>
                        <thead>
                            <tr>
                                <th>Escala de Richter</th>
                                <th>Escala de Mercalli</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Mide <strong>magnitud</strong> (energía liberada)</td>
                                <td>Mide <strong>intensidad</strong> (efectos en la superficie)</td>
                            </tr>
                            <tr>
                                <td>Es <strong>objetiva</strong></td>
                                <td>Es <strong>subjetiva</strong></td>
                            </tr>
                            <tr>
                                <td>Se mide con <strong>sismógrafo</strong></td>
                                <td>Se mide por <strong>observación</strong> de daños</td>
                            </tr>
                            <tr>
                                <td>Escala <strong>logarítmica</strong></td>
                                <td>Escala de <strong>12 grados</strong> (I a XII)</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            `
        },
        { // Slide 4 - Volcanes: Definición y Partes
            title: "🌋 Volcanes: Definición y Partes",
            content: `
                <p>Un <strong class="highlight">volcán</strong> es una estructura geológica formada por la acumulación de materiales (lava, ceniza, gases) expulsados desde el interior de la Tierra a través de una abertura en la corteza.</p>

                <div class="subsection">
                    <div class="subsection-title">🗺️ Partes del Volcán</div>
                    <table>
                        <thead>
                            <tr>
                                <th>Parte</th>
                                <th>Descripción</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><strong>Cámara magmática</strong></td>
                                <td>Reservorio subterráneo donde se acumula el magma antes de una erupción.</td>
                            </tr>
                            <tr>
                                <td><strong>Chimenea</strong></td>
                                <td>Conducto o tubo por donde asciende el magma desde la cámara magmática.</td>
                            </tr>
                            <tr>
                                <td><strong>Cráter</strong></td>
                                <td>Abertura en la cima del volcán por donde salen los materiales expulsados.</td>
                            </tr>
                            <tr>
                                <td><strong>Cono volcánico</strong></td>
                                <td>Estructura formada por la acumulación de materiales expulsados durante las erupciones.</td>
                            </tr>
                            <tr>
                                <td><strong>Flanco</strong></td>
                                <td>Ladera o pendiente del volcán.</td>
                            </tr>
                            <tr>
                                <td><strong>Pico</strong></td>
                                <td>Punto más alto del volcán.</td>
                            </tr>
                            <tr>
                                <td><strong>Lava</strong></td>
                                <td>Magma que fluye por la superficie del volcán.</td>
                            </tr>
                            <tr>
                                <td><strong>Ceniza volcánica</strong></td>
                                <td>Partículas sólidas finas expulsadas durante la erupción volcánica.</td>
                            </tr>
                            <tr>
                                <td><strong>Fumarola</strong></td>
                                <td>Emisión de gases y vapor por las grietas del volcán.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="subsection">
                    <div class="subsection-title">🔍 Otras Estructuras</div>
                    <div class="grid-2">
                        <div class="card">
                            <h4>Caldera</h4>
                            <p>Gran depresión en la cima de un volcán formada por el colapso de la estructura después de una erupción masiva.</p>
                        </div>
                        <div class="card">
                            <h4>Domo de lava</h4>
                            <p>Acumulación de lava viscosa en el cráter que no fluye, formando una cúpula.</p>
                        </div>
                        <div class="card">
                            <h4>Cono parásito</h4>
                            <p>Cono secundario que se forma en los flancos del volcán principal.</p>
                        </div>
                        <div class="card">
                            <h4>Flujo piroclástico</h4>
                            <p>Mezcla de gases calientes, ceniza y roca que se desplaza a gran velocidad durante una erupción explosiva.</p>
                        </div>
                    </div>
                </div>
            `
        },
        { // Slide 5 - Tipos de Volcanes y Erupciones
            title: "🔥 Tipos de Volcanes y Erupciones",
            content: `

    let currentIndex = 0;

    function renderCircles() {
        const container = document.getElementById('nav-circles');
        container.innerHTML = '';
        for (let i = 0; i < slides.length; i++) {
            const circle = document.createElement('div');
            circle.className = 'circle';
            circle.textContent = i + 1;
            if (i === currentIndex) circle.classList.add('active');
            circle.addEventListener('click', () => goToSlide(i));
            container.appendChild(circle);
        }
    }

    function renderCurrentSlide() {
        const container = document.getElementById('slides-container');
        const slide = slides[currentIndex];
        container.innerHTML = `
            <div class="section active-slide">
                <div class="section-title">
                    <span>${slide.title.split(' ')[0]}</span> ${slide.title.substring(slide.title.indexOf(' '))}
                </div>
                ${slide.content}
            </div>
        `;
        
        document.querySelectorAll('.circle').forEach((circle, idx) => {
            if (idx === currentIndex) circle.classList.add('active');
            else circle.classList.remove('active');
        });
        
        document.getElementById('progressInfo').innerHTML = `📖 Slide ${currentIndex + 1} de ${slides.length}`;
        
        const prevBtn = document.getElementById('prevSlideBtn');
        const nextBtn = document.getElementById('nextSlideBtn');
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === slides.length - 1;
    }

    function goToSlide(index) {
        if (index >= 0 && index < slides.length) {
            currentIndex = index;
            renderCurrentSlide();
        }
    }

    function nextSlide() {
        if (currentIndex < slides.length - 1) {
            currentIndex++;
            renderCurrentSlide();
        }
    }

    function prevSlide() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentSlide();
        }
    }

    renderCircles();
    renderCurrentSlide();

    document.getElementById('prevSlideBtn').addEventListener('click', prevSlide);
    document.getElementById('nextSlideBtn').addEventListener('click', nextSlide);
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') {
            prevSlide();
        } else if (e.key === 'ArrowRight') {
            nextSlide();
        }
    });

    document.getElementById('backToFisicaBtn').addEventListener('click', () => {
        window.location.href = 'Fisica.html';
    });
    
    document.getElementById('exercisesBtn').addEventListener('click', () => {
        window.location.href = 'C_4A_Fisica.html';
    });
</script>
