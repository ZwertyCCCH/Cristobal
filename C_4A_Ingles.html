<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Grammar Exercises - Comparatives, Superlatives & Adverbs of Degree</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f8;
            padding: 20px;
            min-height: 100vh;
        }

        /* Layout principal con sidebar */
        .container {
            max-width: 1400px;
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }

        /* TABS LATERAL ESTÁTICO */
        .tabs {
            display: flex;
            flex-direction: column;
            width: 140px;
            min-width: 140px;
            background: #f8fafc;
            border-right: 2px solid #e2e8f0;
            gap: 8px;
            padding: 24px 12px;
            height: auto;
            flex-shrink: 0;
        }

        .tab-btn {
            width: 100%;
            padding: 14px 8px;
            background: transparent;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            color: #64748b;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
        }

        .tab-btn i {
            font-size: 1.4rem;
        }

        .tab-btn span {
            font-size: 0.7rem;
        }

        .tab-btn.active {
            background: white;
            color: #1e2a5e;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 3px solid #f4a261;
        }
        /* Estilos para ocultar/mostrar secciones */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        .tab-content-container {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            max-height: 90vh;
        }

        /* Contenedor del contenido */
        .tab-content-container {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            max-height: 90vh;
        }

        /* Ajustes responsive para móvil */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .tabs {
                flex-direction: row;
                width: 100%;
                min-width: auto;
                border-right: none;
                border-bottom: 2px solid #e2e8f0;
                padding: 12px;
                overflow-x: auto;
                gap: 4px;
            }
            
            .tab-btn {
                flex-direction: row;
                gap: 6px;
                min-width: auto;
                padding: 10px 14px;
            }
            
            .tab-btn i {
                font-size: 1rem;
            }
            
            .tab-btn span {
                font-size: 0.75rem;
                display: inline;
            }
            
            .tab-content-container {
                padding: 16px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Questions styling */
        .question-card {
            background: #fef9e6;
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #ffe2b5;
            transition: all 0.2s;
        }

        .question-card.correct-highlight {
            border-left: 6px solid #2e7d32;
            background: #f1f8e9;
        }

        .question-card.wrong-highlight {
            border-left: 6px solid #c62828;
            background: #ffebee;
        }

        .question-text {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 1rem;
            color: #1e2a5e;
        }

        .correct-answer-display {
            font-size: 0.85rem;
            margin-top: 10px;
            padding: 8px;
            background: #e8eaf6;
            border-radius: 16px;
            color: #1e2a5e;
        }

        .correct-answer-display i {
            margin-right: 6px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: white;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option:hover {
            background: #f1f5f9;
        }

        input[type="radio"], input[type="text"], select, textarea {
            font-family: 'Inter', sans-serif;
        }

        input[type="text"], select {
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
            width: 100%;
            background: white;
        }

        .word-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }

        .word-btn {
            background: #eef2ff;
            border: none;
            padding: 12px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #1e2a5e;
        }

        .word-btn.selected {
            background: #2b4f8c;
            color: white;
        }

        .sentence-builder {
            background: #e2e8f0;
            padding: 15px;
            border-radius: 20px;
            margin: 10px 0;
            font-size: 1.1rem;
            min-height: 70px;
        }

        /* MATCH SECTION - CORREGIDO Y MEJORADO */
        .match-item {
            background: white;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }

        .match-left {
            font-weight: 700;
            color: #1e2a5e;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f4a261;
            display: inline-block;
        }

        .match-select {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* Botón Evaluate en la barra lateral */
        .btn-evaluate-sidebar {
            width: 100%;
            margin-top: 20px;
            padding: 14px 8px;
            background: linear-gradient(135deg, #1e2a5e, #2b4f8c);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-evaluate-sidebar i {
            font-size: 1.4rem;
        }

        .btn-evaluate-sidebar span {
            font-size: 0.7rem;
        }

        .btn-evaluate-sidebar:hover {
            transform: translateY(-2px);
            filter: brightness(0.95);
        }

        /* Responsive: en móvil el botón se adapta */
        @media (max-width: 768px) {
            .btn-evaluate-sidebar {
                flex-direction: row;
                gap: 6px;
                margin-top: 0;
                margin-left: auto;
                width: auto;
                padding: 10px 16px;
            }
            
            .btn-evaluate-sidebar i {
                font-size: 1rem;
            }
            
            .btn-evaluate-sidebar span {
                font-size: 0.75rem;
            }
        }

        .results-section {
            background: #1e2a5e;
            color: white;
            padding: 24px 20px;
            border-radius: 24px;
            margin: 20px 0;
            text-align: center;
            display: none;
        }

        .results-section h3 {
            font-size: 1.8rem;
            margin-bottom: 16px;
        }

        .results-section p {
            font-size: 1.4rem;
            margin: 10px 0;
            font-weight: 500;
        }

        #scoreDisplay {
            font-size: 1.6rem;
            font-weight: 700;
        }

        #gradeDisplay {
            font-size: 1.6rem;
            font-weight: 700;
        }

        #passDisplay {
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: 12px;
        }

        /* Responsive para móviles */
        @media (max-width: 680px) {
            .results-section h3 {
                font-size: 1.4rem;
            }
            
            .results-section p {
                font-size: 1.2rem;
            }
            
            #scoreDisplay, #gradeDisplay {
                font-size: 1.3rem;
            }
            
            #passDisplay {
                font-size: 1.1rem;
            }
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
            margin-bottom: 20px;
            display: none;
        }

        .btn {
            padding: 14px 24px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #f4a261;
            color: #1e2a5e;
        }

        .btn-secondary {
            background: #2b4f8c;
            color: white;
        }

        .btn-outline {
            background: white;
            border: 2px solid #1e2a5e;
            color: #1e2a5e;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(0.95);
        }
        .match-item.correct-highlight {
            border-left: 6px solid #2e7d32;
            background: #f1f8e9;
        }

        .match-item.wrong-highlight {
            border-left: 6px solid #c62828;
            background: #ffebee;
        }

        @media (max-width: 680px) {
            .tab-btn span {
                display: none;
            }
            .tab-btn i {
                font-size: 1.3rem;
            }
            .tab-btn {
                min-width: 60px;
            }
            .question-card {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- TABS LATERAL ESTÁTICO -->
    <!-- TABS LATERAL ESTÁTICO CON BOTÓN EVALUATE -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="tab1"><i class="fas fa-check-circle"></i><span> MCQ</span></button>
        <button class="tab-btn" data-tab="tab2"><i class="fas fa-pen"></i><span> Gap Fill</span></button>
        <button class="tab-btn" data-tab="tab3"><i class="fas fa-sort-amount-down"></i><span> Word Order</span></button>
        <button class="tab-btn" data-tab="tab4"><i class="fas fa-link"></i><span> Matching</span></button>
        <button class="tab-btn" data-tab="tab5"><i class="fas fa-edit"></i><span> Correct Error</span></button>
        
        <!-- Botón Evaluate dentro de la barra lateral -->
        <button class="btn-evaluate-sidebar" id="evaluateBtnSidebar">
            <i class="fas fa-check-double"></i><span> Evaluate</span>
        </button>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="tab-content-container">
        <div id="tab1" class="tab-content active"><div id="mcq-questions"></div></div>
        <div id="tab2" class="tab-content"><div id="gapfill-questions"></div></div>
        <div id="tab3" class="tab-content"><div id="order-questions"></div></div>
        <div id="tab4" class="tab-content"><div id="match-questions"></div></div>
        <div id="tab5" class="tab-content"><div id="correct-questions"></div></div>

        <!-- RESULTS SECTION -->
        <div class="results-section" id="resultsSection">
            <h3><i class="fas fa-chart-line"></i> Your Results</h3>
            <p id="scoreDisplay">Score: -- / 50</p>
            <p id="gradeDisplay">Grade: -- (1.0 to 7.0)</p>
            <p id="passDisplay"></p>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="action-buttons" id="actionButtons">
            <button class="btn btn-primary" id="restartBtn"><i class="fas fa-sync-alt"></i> Restart Test</button>
            <button class="btn btn-secondary" id="backToClassBtn"><i class="fas fa-chalkboard"></i> Back to Class</button>
            <button class="btn btn-outline" id="backToCourseBtn"><i class="fas fa-book-open"></i> Back to Course</button>
        </div>
    </div>
</div>

<script>
    // ======================== POOLS OF 30 QUESTIONS PER SECTION ========================
    const mcqPool = [
        { text: "My brother is ______ than me.", options: ["old", "older", "oldest", "more old"], correct: "older" },

        { text: "She runs ______ than anyone in my family.", options: ["fast", "faster", "fastest", "more fast"], correct: "faster" },
        { text: "He is ______ intelligent student in the school.", options: ["more", "the most", "the more", "most"], correct: "the most" },
        { text: "My sister is ______ generous than my brother.", options: ["more", "most", "the most", "much"], correct: "more" },
        { text: "That test was ______ difficult than the last one.", options: ["more", "most", "the most", "much"], correct: "more" },

        { text: "I feel ______ today than yesterday.", options: ["good", "better", "best", "more good"], correct: "better" },
        { text: "This book is ______ interesting than that one.", options: ["more", "most", "the most", "much"], correct: "more" },

        { text: "She works ______ than anyone else.", options: ["hard", "harder", "hardest", "more hard"], correct: "harder" },
        { text: "He's ______ person in the class.", options: ["the more shyest", "the most shy", "the shyest", "the shyer"], correct: "the shyest" },
        { text: "My phone is ______ than my friend's phone.", options: ["cheap", "cheaper", "cheapest", "more cheap"], correct: "cheaper" },
        { text: "This is ______ beautiful beach in the country.", options: ["the more", "the most", "more", "most"], correct: "the most" },
        { text: "She sings ______ than me.", options: ["more beautifully", "more beautiful", "most beautiful", "beautifully"], correct: "more beautifully" },
        { text: "He arrived ______ than expected.", options: ["late", "later", "latest", "more late"], correct: "later" },
        { text: "That was ______ exciting match of the season.", options: ["the more", "the most", "more", "most"], correct: "the most" },
        { text: "My grandmother is ______ than my grandfather.", options: ["old", "older", "oldest", "more old"], correct: "older" },
        { text: "She is ______ patient teacher in the school.", options: ["the more", "the most", "more", "most"], correct: "the most" },
        { text: "She completed the task ______ than anyone had anticipated.", options: ["more efficiently", "most efficiently", "more efficient", "the most efficiently"], correct: "more efficiently" },
        { text: "This is ______ software our company has ever developed.", options: ["the most sophisticated", "the sophisticatedest", "more sophisticated", "the more sophisticated"], correct: "the most sophisticated" },
        { text: "He performed ______ under pressure than his previous records suggested.", options: ["far better", "far more good", "the far best", "much more better"], correct: "far better" },
    ];

    const gapFillPool = [
        { text: "This test is __________ (difficult) than the last one.", answer: "more difficult" },
        { text: "He runs __________ (fast) of all the players.", answer: "the fastest" },
        { text: "She is __________ (intelligent) student in the whole class.", answer: "the most intelligent" },
        { text: "My car is __________ (expensive) than yours.", answer: "more expensive" },
        { text: "Today is __________ (hot) day of the year.", answer: "the hottest" },
        { text: "He speaks __________ (quietly) than his sister.", answer: "more quietly" },
        { text: "This is __________ (good) pizza I've ever eaten.", answer: "the best" },
        { text: "I am __________ (tall) than my brother.", answer: "taller" },

        { text: "My room is __________ (clean) than my brother's room.", answer: "cleaner" },
        { text: "This is __________ (interesting) book I've read.", answer: "the most interesting" },

        { text: "His answer was __________ (accurate) than mine.", answer: "more accurate" }
    ];

    const orderPool = [
        { words: ["brother", "my", "older", "is", "me", "than"], correct: "my brother is older than me" },
        { words: ["the", "she", "tallest", "is", "class", "in"], correct: "she is the tallest in the class" },

        { words: ["most", "beautiful", "the", "flower", "this", "is"], correct: "this is the most beautiful flower" },
        { words: ["than", "more", "interesting", "is", "book", "that", "this"], correct: "this book is more interesting than that" },

        { words: ["harder", "than", "works", "anyone", "she", "else"], correct: "she works harder than anyone else" },
        { words: ["the", "oldest", "am", "I", "friends", "of", "my"], correct: "i am the oldest of my friends" },

        { words: ["laziest", "my", "the", "cat", "is"], correct: "my cat is the laziest" }

    const matchPool = [
        { left: "The tallest", right: "building" },
        { left: "More beautiful", right: "than before" },
        { left: "The worst", right: "day" },

    function getRandomItems(pool, n) {
        const shuffled = [...pool];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, n);
    }

    let currentMcq = [], currentGap = [], currentOrder = [], currentMatch = [], currentCorrect = [];
    let mcqAnswers = [], gapAnswers = [], orderAnswers = [], matchAnswers = [], correctAnswers = [];
    let evaluated = false;

    function renderAll() {
        renderMcq();
        renderGapFill();
        renderOrder();
        renderMatch();
        renderCorrect();
    }

    function renderMcq() {
        const container = document.getElementById('mcq-questions');
        container.innerHTML = '';
        currentMcq.forEach((q, idx) => {
            const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
            const div = document.createElement('div');
            div.className = 'question-card';
            div.id = `mcq-card-${idx}`;
            div.innerHTML = `
                <div class="question-text">${idx+1}. ${q.text}</div>
                <div class="options" data-qidx="${idx}">
                    ${shuffledOptions.map(opt => `
                        <label class="option">
                            <input type="radio" name="mcq_${idx}" value="${opt}">
                            <span>${opt}</span>
                        </label>
                    `).join('')}
                </div>
            `;
            container.appendChild(div);
            if(mcqAnswers[idx]) {
                const radios = div.querySelectorAll(`input[name="mcq_${idx}"]`);
                radios.forEach(radio => { if(radio.value === mcqAnswers[idx]) radio.checked = true; });
            }
            div.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', (e) => { if(!evaluated) mcqAnswers[idx] = e.target.value; });
            });
        });
    }

    function renderGapFill() {
        const container = document.getElementById('gapfill-questions');
        container.innerHTML = '';
        currentGap.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'question-card';
            div.id = `gap-card-${idx}`;
            div.innerHTML = `
                <div class="question-text">${idx+1}. ${q.text}</div>
                <input type="text" class="gap-input" data-idx="${idx}" placeholder="Type your answer..." value="${gapAnswers[idx] || ''}">
            `;
            container.appendChild(div);
            const input = div.querySelector('.gap-input');
            input.addEventListener('input', (e) => { if(!evaluated) gapAnswers[idx] = e.target.value.trim().toLowerCase(); });
        });
    }

    function renderOrder() {
        const container = document.getElementById('order-questions');
        container.innerHTML = '';
        currentOrder.forEach((q, idx) => {
            const shuffledWords = [...q.words].sort(() => Math.random() - 0.5);
            const div = document.createElement('div');
            div.className = 'question-card';
            div.id = `order-card-${idx}`;
            div.innerHTML = `
                <div class="question-text">${idx+1}. Tap the words in order:</div>
                <div class="word-buttons" data-order-idx="${idx}">
                    ${shuffledWords.map(word => `<button class="word-btn" data-word="${word}">${word}</button>`).join('')}
                </div>
                <div class="sentence-builder" id="sentence-${idx}"></div>
                <button class="clear-order-btn" data-idx="${idx}" style="margin-top:8px; padding:6px 16px; border-radius:40px; border:1px solid #cbd5e1; background:#f1f5f9; cursor:pointer; font-size:0.85rem;">🔄 Clear</button>
            `;
            container.appendChild(div);
            const builder = div.querySelector(`#sentence-${idx}`);
            let selectedWords = orderAnswers[idx] ? orderAnswers[idx].split(' ') : [];
            function updateBuilder() { builder.innerHTML = selectedWords.join(' ') || 'Click words in the correct order...'; }
            updateBuilder();
            const btns = div.querySelectorAll('.word-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    if(evaluated) return;
                    const word = btn.getAttribute('data-word');
                    if(selectedWords.includes(word) && selectedWords[selectedWords.length-1] === word) {
                        selectedWords.pop();
                        btn.classList.remove('selected');
                    } else if(!selectedWords.includes(word)) {
                        selectedWords.push(word);
                        btn.classList.add('selected');
                    }
                    orderAnswers[idx] = selectedWords.join(' ');
                    updateBuilder();
                });
            });
            const clearBtn = div.querySelector('.clear-order-btn');
            clearBtn.addEventListener('click', () => {
                if(evaluated) return;
                selectedWords = [];
                orderAnswers[idx] = '';
                div.querySelectorAll('.word-btn').forEach(b => b.classList.remove('selected'));
                updateBuilder();
            });
            if(orderAnswers[idx]) {
                const stored = orderAnswers[idx].split(' ');
                selectedWords = stored;
                updateBuilder();
            }
        });
    }

    function renderMatch() {
    const container = document.getElementById('match-questions');
    container.innerHTML = '';
    currentMatch.forEach((q, idx) => {
        // Opción correcta es la palabra/frase corta (q.right)
        const correctOption = q.right;
        
        // Obtener otras opciones del pool que NO sean la correcta
        const otherOptions = [...new Set(
            currentMatch.filter(item => item.right !== correctOption).map(item => item.right)
        )];
        // Mezclar y tomar 4 opciones incorrectas
        const shuffledOthers = [...otherOptions].sort(() => Math.random() - 0.5);
        const incorrectOptions = shuffledOthers.slice(0, 4);
        // Combinar correcta + incorrectas y mezclar
        let allOptions = [correctOption, ...incorrectOptions];
        allOptions = allOptions.sort(() => Math.random() - 0.5);
        
        const div = document.createElement('div');
        div.className = 'match-item';
        div.id = `match-card-${idx}`;
        div.innerHTML = `
            <div class="match-left">📌 ${q.left}</div>
            <select class="match-select" data-idx="${idx}">
                <option value="">-- Select the correct match --</option>
                ${allOptions.map(opt => `<option value="${opt}" ${matchAnswers[idx] === opt ? 'selected' : ''}>${opt}</option>`).join('')}
            </select>
        `;
        container.appendChild(div);
        const sel = div.querySelector('.match-select');
        sel.addEventListener('change', (e) => { if(!evaluated) matchAnswers[idx] = e.target.value; });
    });
    }

    function renderCorrect() {
        const container = document.getElementById('correct-questions');
        container.innerHTML = '';
        currentCorrect.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'question-card';
            div.id = `correct-card-${idx}`;
            div.innerHTML = `
                <div class="question-text">${idx+1}. Correct the error: "${q.text}"</div>
                <input type="text" class="correct-input" data-idx="${idx}" placeholder="Write the correct sentence..." value="${correctAnswers[idx] || ''}">
            `;
            container.appendChild(div);
            const inp = div.querySelector('.correct-input');
            inp.addEventListener('input', (e) => { if(!evaluated) correctAnswers[idx] = e.target.value.trim().toLowerCase(); });
        });
    }

    function showCorrectAnswers() {
        // MCQ
        currentMcq.forEach((q, idx) => {
            const card = document.getElementById(`mcq-card-${idx}`);
            if(!card) return;
            const isCorrect = mcqAnswers[idx] === q.correct;
            card.classList.add(isCorrect ? 'correct-highlight' : 'wrong-highlight');
            const correctDiv = document.createElement('div');
            correctDiv.className = 'correct-answer-display';
            correctDiv.innerHTML = `<i class="fas fa-info-circle"></i> Correct answer: ${q.correct}`;
            if(!card.querySelector('.correct-answer-display')) card.appendChild(correctDiv);
        });
        // Gap Fill
        currentGap.forEach((q, idx) => {
            const card = document.getElementById(`gap-card-${idx}`);
            if(!card) return;
            const isCorrect = gapAnswers[idx].trim() === q.answer.toLowerCase().trim();
            card.classList.add(isCorrect ? 'correct-highlight' : 'wrong-highlight');
            const correctDiv = document.createElement('div');
            correctDiv.className = 'correct-answer-display';
            correctDiv.innerHTML = `<i class="fas fa-info-circle"></i> Correct answer: ${q.answer}`;
            if(!card.querySelector('.correct-answer-display')) card.appendChild(correctDiv);
        });
        // Word Order
        currentOrder.forEach((q, idx) => {
            const card = document.getElementById(`order-card-${idx}`);
            if(!card) return;
            const isCorrect = orderAnswers[idx] && orderAnswers[idx].toLowerCase() === q.correct.toLowerCase();
            card.classList.add(isCorrect ? 'correct-highlight' : 'wrong-highlight');
            const correctDiv = document.createElement('div');
            correctDiv.className = 'correct-answer-display';
            correctDiv.innerHTML = `<i class="fas fa-info-circle"></i> Correct sentence: "${q.correct}"`;
            if(!card.querySelector('.correct-answer-display')) card.appendChild(correctDiv);
        });
        // Match - CORREGIDO con frase completa para mostrar
        currentMatch.forEach((q, idx) => {
            const card = document.getElementById(`match-card-${idx}`);
            if(!card) return;
            const userAnswer = matchAnswers[idx];
            const isCorrect = (userAnswer === q.right);
            
            if(isCorrect) {
                card.classList.add('correct-highlight');
                card.classList.remove('wrong-highlight');
            } else {
                card.classList.add('wrong-highlight');
                card.classList.remove('correct-highlight');
            }
            
            if(!card.querySelector('.correct-answer-display')) {
                const correctDiv = document.createElement('div');
                correctDiv.className = 'correct-answer-display';
                // Mostrar la frase completa para que el alumno aprenda
                correctDiv.innerHTML = `<i class="fas fa-info-circle"></i> Correct match: "${q.left} ${q.right}"`;
                card.appendChild(correctDiv);
            }
        });
        // Correct Error
        currentCorrect.forEach((q, idx) => {
            const card = document.getElementById(`correct-card-${idx}`);
            if(!card) return;
            const isCorrect = correctAnswers[idx].replace(/\.$/, '').trim() === q.correct.toLowerCase().replace(/\.$/, '').trim();
            card.classList.add(isCorrect ? 'correct-highlight' : 'wrong-highlight');
            const correctDiv = document.createElement('div');
            correctDiv.className = 'correct-answer-display';
            correctDiv.innerHTML = `<i class="fas fa-info-circle"></i> Correct sentence: "${q.correct}"`;
            if(!card.querySelector('.correct-answer-display')) card.appendChild(correctDiv);
        });
    }

    function calculateAndShowResults() {
    let totalCorrect = 0;
    for(let i=0; i<currentMcq.length; i++) {
        if(mcqAnswers[i] && mcqAnswers[i] === currentMcq[i].correct) totalCorrect++;
    }
    for(let i=0; i<currentGap.length; i++) {
        if(gapAnswers[i] && gapAnswers[i] === currentGap[i].answer.toLowerCase()) totalCorrect++;
    }
    for(let i=0; i<currentOrder.length; i++) {
        if(orderAnswers[i] && orderAnswers[i].toLowerCase() === currentOrder[i].correct.toLowerCase()) totalCorrect++;
    }
    for(let i=0; i<currentMatch.length; i++) {
        if(matchAnswers[i] && matchAnswers[i] === currentMatch[i].right) totalCorrect++;
    }
    for(let i=0; i<currentCorrect.length; i++) {
        if(correctAnswers[i] && correctAnswers[i] === currentCorrect[i].correct.toLowerCase()) totalCorrect++;
    }
    const maxPoints = 50;
    const grade = 1 + (6 * (totalCorrect / maxPoints));
    const finalGrade = grade.toFixed(1);
    
    document.getElementById('scoreDisplay').innerHTML = `Score: ${totalCorrect} / ${maxPoints}`;
    document.getElementById('gradeDisplay').innerHTML = `Grade: ${finalGrade} (1.0 to 7.0)`;
    const passMsg = totalCorrect >= 30 ? '✅ PASSED! (Grade ≥ 4.0)' : '❌ NOT PASSED. Need at least 30 correct answers.';
    document.getElementById('passDisplay').innerHTML = passMsg;
    document.getElementById('resultsSection').style.display = 'block';
    document.getElementById('actionButtons').style.display = 'flex';
    showCorrectAnswers();
    
    // 🔽 NUEVO: Desplazarse automáticamente a la sección de resultados
    const resultsSection = document.getElementById('resultsSection');
    resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    
    // 🔽 NUEVO: Opcional - agregar un efecto de destello para llamar la atención
    resultsSection.style.transition = 'box-shadow 0.3s';
    resultsSection.style.boxShadow = '0 0 0 3px #f4a261';
    setTimeout(() => {
        resultsSection.style.boxShadow = 'none';
    }, 1000);
}

    function evaluateTest() {
        if(evaluated) return;
        evaluated = true;
        calculateAndShowResults();
    }

    function restartTest() {
        currentMcq = getRandomItems(mcqPool, 10);
        currentGap = getRandomItems(gapFillPool, 10);
        currentOrder = getRandomItems(orderPool, 10);
        currentMatch = getRandomItems(matchPool, 10);
        currentCorrect = getRandomItems(correctPool, 10);
        mcqAnswers = new Array(10).fill(null);
        gapAnswers = new Array(10).fill('');
        orderAnswers = new Array(10).fill('');
        matchAnswers = new Array(10).fill('');
        correctAnswers = new Array(10).fill('');
        evaluated = false;
        document.getElementById('resultsSection').style.display = 'none';
        document.getElementById('actionButtons').style.display = 'none';
        renderAll();
    }

 // Tab switching - Versión mejorada
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            // Remover active de todos los botones
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            // Agregar active al botón clickeado
            btn.classList.add('active');
            // Obtener el ID del tab a mostrar
            const tabId = btn.getAttribute('data-tab');
            // Ocultar todos los contenidos
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            // Mostrar el contenido seleccionado
            document.getElementById(tabId).classList.add('active');
        });
    });

    const evaluateBtnSidebar = document.getElementById('evaluateBtnSidebar');
    if (evaluateBtnSidebar) {
        evaluateBtnSidebar.addEventListener('click', evaluateTest);
    }
    document.getElementById('restartBtn').addEventListener('click', restartTest);
    document.getElementById('backToClassBtn').addEventListener('click', () => window.location.href = 'C_4_Ingles.html');
    document.getElementById('backToCourseBtn').addEventListener('click', () => window.location.href = 'Ingles.html');

    restartTest();
</script>
