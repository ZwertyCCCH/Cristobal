<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Unit 2 Exercises - Friendship & Grammar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }

        /* TABS LATERAL ESTÁTICO */
        .tabs {
            display: flex;
            flex-direction: column;
            width: 160px;
            min-width: 160px;
            background: #f8fafc;
            border-right: 2px solid #e2e8f0;
            gap: 8px;
            padding: 24px 12px;
            flex-shrink: 0;
        }

        .tab-btn {
            width: 100%;
            padding: 14px 8px;
            background: transparent;
            border: none;
            font-weight: 600;
            font-size: 0.8rem;
            color: #64748b;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
        }

        .tab-btn i {
            font-size: 1.3rem;
        }

        .tab-btn span {
            font-size: 0.65rem;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 3px solid #f6ad55;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        .tab-content-container {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            max-height: 90vh;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Botón Evaluate en barra lateral */
        .btn-evaluate-sidebar {
            width: 100%;
            margin-top: 20px;
            padding: 14px 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-evaluate-sidebar i {
            font-size: 1.3rem;
        }

        .btn-evaluate-sidebar:hover {
            transform: translateY(-2px);
            filter: brightness(0.95);
        }

        /* Question styling */
        .question-card {
            background: #fef9e6;
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #ffe2b5;
            transition: all 0.2s;
        }

        .question-card.correct-highlight {
            border-left: 6px solid #2e7d32;
            background: #f1f8e9;
        }

        .question-card.wrong-highlight {
            border-left: 6px solid #c62828;
            background: #ffebee;
        }

        .question-text {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 1rem;
            color: #1e2a5e;
        }

        .correct-answer-display {
            font-size: 0.85rem;
            margin-top: 10px;
            padding: 8px;
            background: #e8eaf6;
            border-radius: 16px;
            color: #1e2a5e;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: white;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
        }

        input[type="radio"], input[type="text"], select {
            font-family: 'Inter', sans-serif;
        }

        input[type="text"], select {
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
            width: 100%;
        }

        .results-section {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 24px 20px;
            border-radius: 24px;
            margin: 20px 0;
            text-align: center;
            display: none;
        }

        .results-section h3 {
            font-size: 1.8rem;
            margin-bottom: 16px;
        }

        .results-section p {
            font-size: 1.4rem;
            margin: 10px 0;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
            display: none;
        }

        .btn {
            padding: 14px 24px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #f6ad55;
            color: #1e2a5e;
        }

        .btn-secondary {
            background: #667eea;
            color: white;
        }

        .btn-outline {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .tabs {
                flex-direction: row;
                width: 100%;
                overflow-x: auto;
                padding: 12px;
            }
            .tab-btn {
                flex-direction: row;
                gap: 6px;
                width: auto;
                padding: 10px 14px;
            }
            .btn-evaluate-sidebar {
                flex-direction: row;
                margin-top: 0;
                width: auto;
            }
        }
    </style>
</head>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" data-tab="tab1"><i class="fas fa-users"></i><span> Friendship Verbs</span></button>

    <div class="tab-content-container">

<script>

    function getRandomItems(pool, n) {
        const shuffled = [...pool];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, n);
    }

    let currentVocab = [], currentPrep = [], currentTag = [], currentPoem = [], currentReading = [];

    function renderVocab() {
        const container = document.getElementById('vocab-questions');
        container.innerHTML = '';
        currentVocab.forEach((q, idx) => {
            const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
            const div = document.createElement('div');
            div.className = 'question-card';
            div.id = `vocab-card-${idx}`;
            div.innerHTML = `
                <div class="question-text">${idx+1}. ${q.text}</div>
                <div class="options">
                    ${shuffledOptions.map(opt => `
                        <label class="option">
                            <input type="radio" name="vocab_${idx}" value="${opt}">
                            <span>${opt}</span>
                        </label>
                    `).join('')}
                </div>
            `;
            container.appendChild(div);
            if(vocabAnswers[idx]) {
                const radios = div.querySelectorAll(`input[name="vocab_${idx}"]`);
                radios.forEach(radio => { if(radio.value === vocabAnswers[idx]) radio.checked = true; });
            }
            div.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', (e) => { if(!evaluated) vocabAnswers[idx] = e.target.value; });
            });
        });
    }

    function showCorrectAnswers() {
        const sections = [
            { current: currentVocab, answers: vocabAnswers, prefix: 'vocab', getCorrect: (q) => q.correct },
            { current: currentPrep, answers: prepAnswers, prefix: 'prep', getCorrect: (q) => q.correct },
            { current: currentTag, answers: tagAnswers, prefix: 'tag', getCorrect: (q) => q.correct },
            { current: currentPoem, answers: poemAnswers, prefix: 'poem', getCorrect: (q) => q.correct },
            { current: currentReading, answers: readingAnswers, prefix: 'reading', getCorrect: (q) => q.correct }
        ];
        sections.forEach(section => {
            section.current.forEach((q, idx) => {
                const card = document.getElementById(`${section.prefix}-card-${idx}`);
                if(!card) return;
                const isCorrect = section.answers[idx] === q.correct;
                card.classList.add(isCorrect ? 'correct-highlight' : 'wrong-highlight');
                if(!card.querySelector('.correct-answer-display')) {
                    const correctDiv = document.createElement('div');
                    correctDiv.className = 'correct-answer-display';
                    correctDiv.innerHTML = `<i class="fas fa-info-circle"></i> Correct answer: ${q.correct}`;
                    card.appendChild(correctDiv);
                }
            });
        });
    }

    function calculateAndShowResults() {
        let totalCorrect = 0;
        for(let i=0; i<currentVocab.length; i++) {
            if(vocabAnswers[i] && vocabAnswers[i] === currentVocab[i].correct) totalCorrect++;
        }
        for(let i=0; i<currentPrep.length; i++) {
            if(prepAnswers[i] && prepAnswers[i] === currentPrep[i].correct) totalCorrect++;
        }
        for(let i=0; i<currentTag.length; i++) {
            if(tagAnswers[i] && tagAnswers[i] === currentTag[i].correct) totalCorrect++;
        }
        for(let i=0; i<currentPoem.length; i++) {
            if(poemAnswers[i] && poemAnswers[i] === currentPoem[i].correct) totalCorrect++;
        }
        for(let i=0; i<currentReading.length; i++) {
            if(readingAnswers[i] && readingAnswers[i] === currentReading[i].correct) totalCorrect++;
        }
        const maxPoints = 50;
        const grade = 1 + (6 * (totalCorrect / maxPoints));
        const finalGrade = grade.toFixed(1);
        document.getElementById('scoreDisplay').innerHTML = `Score: ${totalCorrect} / ${maxPoints}`;
        document.getElementById('gradeDisplay').innerHTML = `Grade: ${finalGrade} (1.0 to 7.0)`;
        const passMsg = totalCorrect >= 30 ? '✅ PASSED! (Grade ≥ 4.0)' : '❌ NOT PASSED. Need at least 30 correct answers.';
        document.getElementById('passDisplay').innerHTML = passMsg;
        document.getElementById('resultsSection').style.display = 'block';
        document.getElementById('actionButtons').style.display = 'flex';
        showCorrectAnswers();
        const resultsSection = document.getElementById('resultsSection');
        resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        resultsSection.style.transition = 'box-shadow 0.3s';
        resultsSection.style.boxShadow = '0 0 0 3px #f6ad55';
        setTimeout(() => { resultsSection.style.boxShadow = 'none'; }, 1000);
    }

    function evaluateTest() {
        if(evaluated) return;
        evaluated = true;
        calculateAndShowResults();
    }

    function restartTest() {
        currentVocab = getRandomItems(vocabPool, 10);
        currentPrep = getRandomItems(prepositionPool, 10);
        currentTag = getRandomItems(tagPool, 10);
        currentPoem = getRandomItems(poemPool, 10);
        currentReading = getRandomItems(readingPool, 10);
        vocabAnswers = new Array(10).fill(null);
        prepAnswers = new Array(10).fill(null);
        tagAnswers = new Array(10).fill(null);
        poemAnswers = new Array(10).fill(null);
        readingAnswers = new Array(10).fill(null);
        evaluated = false;
        document.getElementById('resultsSection').style.display = 'none';
        document.getElementById('actionButtons').style.display = 'none';
        renderAll();
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {

            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tabId = btn.getAttribute('data-tab');
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
            });
        }
    });
