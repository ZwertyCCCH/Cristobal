<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clase 5: Tectónica, Sismos, Volcanes, Tsunamis y Huracanes | 7° Básico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a1628;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
        }
        .slides-container {
            position: relative;
            width: 100%;
            max-width: 1300px;
            height: 85vh;
            max-height: 800px;
            background: #0d1b2a;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid #1a365d;
        }
        .slides-wrapper { position: relative; width: 100%; height: 100%; }
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 2.5rem 3rem;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            overflow-y: auto;
            background: #0d1b2a;
            color: #e2e8f0;
        }
        .slide.active { opacity: 1; visibility: visible; z-index: 10; }
        .slide::-webkit-scrollbar { width: 5px; }
        .slide::-webkit-scrollbar-track { background: #1a365d; border-radius: 10px; }
        .slide::-webkit-scrollbar-thumb { background: #2b6cb0; border-radius: 10px; }
        .slide-number {
            position: absolute; bottom: 20px; right: 30px;
            font-size: 0.75rem; color: #4a7a9c;
            background: #0d1b2a; padding: 0.2rem 0.8rem;
            border-radius: 20px; border: 1px solid #1a365d; z-index: 15;
        }
        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            z-index: 20; background: rgba(26,54,93,0.7);
            border: 1px solid #2b6cb0; color: #90cdf4;
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.3rem;
            transition: all 0.3s ease; backdrop-filter: blur(5px);
        }
        .nav-arrow:hover:not(:disabled) { background: #2b6cb0; color: white; transform: translateY(-50%) scale(1.05); }
        .nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
        .nav-arrow-left { left: 15px; }
        .nav-arrow-right { right: 15px; }
        .dots-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 15;
            background: rgba(13,27,42,0.8); padding: 6px 14px;
            border-radius: 30px; border: 1px solid #1a365d;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #1a365d; cursor: pointer; transition: all 0.3s ease; }
        .dot.active { background: #2b6cb0; width: 24px; border-radius: 12px; }
        .dot:hover { background: #4a7a9c; }
        .fixed-footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(13,27,42,0.95); backdrop-filter: blur(10px);
            padding: 0.8rem 2rem; display: flex; justify-content: center;
            gap: 2rem; border-top: 1px solid #1a365d; z-index: 1000;
        }
        .footer-btn {
            background: transparent; border: 1px solid #2b6cb0;
            color: #90cdf4; padding: 0.6rem 2rem;
            border-radius: 30px; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease;
            font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 8px;
        }
        .footer-btn:hover { background: #2b6cb0; color: white; transform: translateY(-2px); }
        .footer-btn.primary { background: #2b6cb0; color: white; }
        .footer-btn.primary:hover { background: #3182ce; }
        h1 { font-size: 2.8rem; font-weight: 800; color: #90cdf4; margin-bottom: 0.5rem; }
        h2 { font-size: 2rem; font-weight: 700; color: #63b3ed; margin-bottom: 1rem; border-left: 4px solid #2b6cb0; padding-left: 1rem; }
        h3 { font-size: 1.2rem; font-weight: 600; color: #90cdf4; margin: 0.8rem 0 0.4rem 0; }
        .badge {
            display: inline-block; background: #2b6cb0; color: white;
            padding: 0.2rem 1rem; border-radius: 30px; font-size: 0.7rem;
            font-weight: 600; margin-bottom: 0.8rem; letter-spacing: 0.5px;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin: 0.8rem 0; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 0.8rem 0; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem; margin: 0.8rem 0; }
        .card {
            background: rgba(26,54,93,0.4); border-radius: 16px;
            padding: 1.2rem; border: 1px solid #1a365d;
            transition: all 0.2s ease;
        }
        .card:hover { border-color: #2b6cb0; background: rgba(26,54,93,0.6); }
        .card i { font-size: 1.6rem; color: #63b3ed; margin-bottom: 0.5rem; }
        .card h4 { color: #90cdf4; font-size: 1rem; margin-bottom: 0.4rem; }
        .card p, .card li { color: #cbd5e1; font-size: 0.85rem; line-height: 1.5; }
        .card ul { padding-left: 1.2rem; margin-top: 0.3rem; }
        .card ul li { margin-bottom: 0.2rem; }
        .highlight { color: #63b3ed; font-weight: 600; }
        .info-box {
            background: rgba(26,54,93,0.5); padding: 1rem 1.2rem;
            border-radius: 16px; margin: 0.8rem 0; border-left: 4px solid #2b6cb0;
        }
        .info-box i { color: #63b3ed; margin-right: 8px; }
        .info-box strong { color: #90cdf4; }
        .example-box {
            background: rgba(43,108,176,0.15); border-left: 4px solid #2b6cb0;
            padding: 0.8rem 1.2rem; border-radius: 12px; margin: 0.8rem 0;
        }
        .example-box strong { color: #90cdf4; }
        .comparison-table {
            width: 100%; border-collapse: collapse; margin: 0.8rem 0; font-size: 0.85rem;
        }
        .comparison-table th { background: #1a365d; color: #90cdf4; padding: 0.6rem; text-align: left; }
        .comparison-table td { border: 1px solid #1a365d; padding: 0.6rem; color: #cbd5e1; }
        .comparison-table tr:nth-child(even) { background: rgba(26,54,93,0.3); }
        .timeline {
            display: flex; flex-wrap: wrap; justify-content: space-around;
            gap: 0.8rem; margin: 0.8rem 0;
        }
        .timeline-item {
            background: rgba(26,54,93,0.4); border-radius: 16px;
            padding: 0.8rem 1rem; text-align: center; flex: 1;
            min-width: 120px; border: 1px solid #1a365d;
        }
        .timeline-year { font-size: 1.3rem; font-weight: bold; color: #63b3ed; }
        @media (max-width: 768px) {
            body { padding: 10px; padding-bottom: 70px; }
            .slides-container { height: 80vh; border-radius: 20px; }
            .slide { padding: 1.2rem 1.5rem; }
            h1 { font-size: 1.6rem; }
            h2 { font-size: 1.3rem; }
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
            .nav-arrow { width: 36px; height: 36px; font-size: 1rem; }
            .nav-arrow-left { left: 8px; }
            .nav-arrow-right { right: 8px; }
            .fixed-footer { padding: 0.5rem 1rem; gap: 1rem; }
            .footer-btn { padding: 0.4rem 1.2rem; font-size: 0.8rem; }
            .dots-container { bottom: 12px; padding: 4px 10px; }
            .dot { width: 8px; height: 8px; }
            .dot.active { width: 18px; }
            .slide-number { bottom: 12px; right: 16px; font-size: 0.6rem; }
        }
    </style>
</head>
<body>

<div class="slides-container">

<script>
    // ================================================================

    // NUEVA SLIDE: Rocas y composición de la Tierra

    const slides = [
        // === SLIDE 0: PORTADA ===
        {
            title: "🌍 Cambios del planeta Tierra",
            content: `
                <div style="display:flex; flex-direction:column; justify-content:center; height:100%;">
                    <div class="badge">Clase 5 - Ciencias Naturales</div>
                    <h1 style="font-size:3.2rem;">¿Por qué cambia<br>el planeta Tierra?</h1>
                    <p style="font-size:1.3rem; color:#90cdf4; margin:0.5rem 0;">Tectónica • Sismos • Volcanes • Tsunamis • Huracanes</p>
                    <div style="margin-top:1.5rem; display:flex; gap:1.5rem; flex-wrap:wrap;">
                        <div style="background:rgba(26,54,93,0.5); padding:0.5rem 1.2rem; border-radius:30px; border:1px solid #1a365d;">
                            <i class="fas fa-globe" style="color:#63b3ed;"></i> Tectónica
                        </div>
                        <div style="background:rgba(26,54,93,0.5); padding:0.5rem 1.2rem; border-radius:30px; border:1px solid #1a365d;">
                            <i class="fas fa-waveform" style="color:#63b3ed;"></i> Sismos
                        </div>
                        <div style="background:rgba(26,54,93,0.5); padding:0.5rem 1.2rem; border-radius:30px; border:1px solid #1a365d;">
                            <i class="fas fa-fire" style="color:#63b3ed;"></i> Volcanes
                        </div>
                        <div style="background:rgba(26,54,93,0.5); padding:0.5rem 1.2rem; border-radius:30px; border:1px solid #1a365d;">
                            <i class="fas fa-water" style="color:#63b3ed;"></i> Tsunamis
                        </div>
                        <div style="background:rgba(26,54,93,0.5); padding:0.5rem 1.2rem; border-radius:30px; border:1px solid #1a365d;">
                            <i class="fas fa-wind" style="color:#63b3ed;"></i> Huracanes
                        </div>
                    </div>
                    <div style="margin-top:2rem; color:#4a7a9c; font-size:0.9rem;">
                        <i class="fas fa-arrow-right"></i> Usa las flechas ← → para navegar
                    </div>
                </div>
            `
        },

        // === SLIDE 1: INTRODUCCIÓN ===
        {
            title: "🔄 La Tierra en transformación",
            content: `
                <div class="badge">Lección 4 - Introducción</div>
                <h2>La Tierra cambia constantemente</h2>
                <div class="grid-2">
                    <div class="card">
                        <i class="fas fa-clock"></i>
                        <h4>Desde su formación</h4>
                        <p>Desde su formación, hace aproximadamente <span class="highlight">4.600 millones de años</span>, la Tierra ha estado en <span class="highlight">continua transformación</span>.</p>
                        <p style="margin-top:0.5rem;">Los cambios ocurren por <span class="highlight">procesos internos</span> (energía del interior) y <span class="highlight">procesos externos</span> (agentes como el agua, el viento y el hielo).</p>
                    </div>
                    <div class="card">
                        <i class="fas fa-lightbulb"></i>
                        <h4>¿Cómo explicamos estos cambios?</h4>
                        <p>Los científicos utilizan <span class="highlight">teorías y modelos</span> para explicar los procesos que transforman la Tierra.</p>
                        <p style="margin-top:0.5rem;">La <span class="highlight">Teoría de la Tectónica de Placas</span> es la más aceptada para explicar el movimiento de la corteza terrestre.</p>
                    </div>
                </div>
                <div class="info-box">
                    <i class="fas fa-lightbulb"></i> <strong>Idea clave:</strong> La Tierra no es estática; está en <span class="highlight">permanente movimiento y cambio</span>.
                </div>
            `
        },

        // === SLIDE 2: TEORÍA DE TECTÓNICA DE PLACAS ===
        {
            title: "🧩 Tectónica de placas",
            content: `
                <div class="badge">Lección 4 - Tectónica de placas</div>
                <h2>Teoría de la Tectónica de Placas</h2>
                <div class="grid-2">
                    <div class="card">
                        <i class="fas fa-puzzle-piece"></i>
                        <h4>Definición</h4>
                        <p>La <span class="highlight">teoría de la tectónica de placas</span> postula que la <span class="highlight">corteza terrestre</span> está fragmentada en grandes secciones llamadas <span class="highlight">placas tectónicas</span> que se desplazan unas respecto de otras sobre el <span class="highlight">manto</span>.</p>
                    </div>
                    <div class="card">
                        <i class="fas fa-thermometer-half"></i>
                        <h4>¿Qué produce el movimiento?</h4>
                        <p>La explicación más aceptada se basa en la <span class="highlight">diferencia de temperatura</span> entre el <span class="highlight">núcleo</span> (muy caliente) y el <span class="highlight">manto</span> (menos caliente).</p>
                        <p style="margin-top:0.5rem;">Esto genera <span class="highlight">corrientes de convección</span> en el manto que mueven las placas.</p>
                    </div>
                </div>
                <div class="example-box">
                    <strong>Dato:</strong> Las placas se mueven aproximadamente <span class="highlight">2 a 10 cm por año</span>, similar al crecimiento de las uñas.
                </div>
            `
        },

        // === SLIDE 3: CORRIENTES DE CONVECCIÓN ===
        {
            title: "🔥 Corrientes de convección",
            content: `
                <div class="badge">Lección 4 - Corrientes de convección</div>
                <h2>Corrientes de convección en el manto</h2>
                <div class="grid-2">
                    <div class="card">
                        <i class="fas fa-arrow-up"></i>
                        <h4>Proceso</h4>
                        <ul>
                            <li>El material caliente del <span class="highlight">núcleo</span> asciende hacia el manto.</li>
                            <li>Al llegar cerca de la corteza, se enfría y <span class="highlight">desciende</span>.</li>
                            <li>Este ciclo continuo genera <span class="highlight">corrientes circulares</span>.</li>
                        </ul>
                    </div>
                    <div class="card">
                        <i class="fas fa-arrows-alt-v"></i>
                        <h4>Efecto en las placas</h4>
                        <p>Estas corrientes <span class="highlight">arrastran</span> las placas tectónicas, provocando que se muevan, choquen, se separen o deslicen.</p>
                        <p style="margin-top:0.5rem;">Es la <span class="highlight">energía interna</span> de la Tierra la que impulsa estos movimientos.</p>
                    </div>
                </div>
                <div class="info-box">
                    <i class="fas fa-lightbulb"></i> <strong>Analogía:</strong> Las corrientes de convección son como el agua caliente que sube y baja en una olla al hervir.
                </div>
            `
        },

        // === SLIDE 4: LÍMITES CONVERGENTES ===
        {
            title: "➡️ Límites convergentes",
            content: `
                <div class="badge">Lección 4 - Límites de placas</div>
                <h2>Límite convergente</h2>
                <div class="grid-2">
                    <div class="card">
                        <i class="fas fa-arrows-alt-h"></i>
                        <h4>¿Qué ocurre?</h4>
                        <p>Dos placas <span class="highlight">chocan</span> entre sí. Esto puede producir:</p>
                        <ul>
                            <li><span class="highlight">Subducción</span>: una placa se hunde bajo la otra.</li>
                            <li><span class="highlight">Compresión</span>: ambas placas se comprimen.</li>
                        </ul>
                    </div>
                    <div class="card">
                        <i class="fas fa-mountain"></i>
                        <h4>Consecuencias</h4>
                        <ul>
                            <li>Formación de <span class="highlight">montañas</span> (ej. Himalaya).</li>
                            <li>Formación de <span class="highlight">volcanes</span> (ej. Andes).</li>
                            <li>Generación de <span class="highlight">sismos</span> de gran magnitud.</li>
                            <li>Formación de <span class="highlight">fosas oceánicas</span>.</li>
                        </ul>
                    </div>
                </div>
                <div class="example-box">
                    <strong>Ejemplo en Chile:</strong> Límite convergente entre la <span class="highlight">Placa de Nazca</span> (oceánica) y la <span class="highlight">Placa Sudamericana</span> (continental).
                </div>
            `
        },

        // === SLIDE 5: LÍMITES DIVERGENTES ===
        {
            title: "⬅️ Límites divergentes",
            content: `
                <div class="badge">Lección 4 - Límites de placas</div>
                <h2>Límite divergente</h2>
                <div class="grid-2">
                    <div class="card">
                        <i class="fas fa-arrows-alt-h"></i>
                        <h4>¿Qué ocurre?</h4>
                        <p>Dos placas se <span class="highlight">separan</span> en direcciones opuestas.</p>
                        <p style="margin-top:0.5rem;">El espacio que queda es ocupado por <span class="highlight">magma</span> que asciende desde el manto.</p>
                    </div>
                    <div class="card">
                        <i class="fas fa-water"></i>
                        <h4>Consecuencias</h4>
                        <ul>
                            <li>Formación de <span class="highlight">nueva corteza oceánica</span>.</li>
                            <li>Formación de <span class="highlight">dorsales oceánicas</span>.</li>
                            <li>Actividad sísmica de <span class="highlight">baja magnitud</span>.</li>
                            <li>Formación de <span class="highlight">riftes continentales</span>.</li>
                        </ul>
                    </div>
                </div>
                <div class="example-box">
                    <strong>Ejemplo:</strong> La <span class="highlight">Dorsal Mesoatlántica</span> en el Océano Atlántico.
                </div>
            `
        },

        // === SLIDE 6: LÍMITES TRANSFORMANTES ===
        {
            title: "🔄 Límites transformantes",
            content: `
                <div class="badge">Lección 4 - Límites de placas</div>
                <h2>Límite transformante</h2>
                <div class="grid-2">
                    <div class="card">
                        <i class="fas fa-arrows-alt-h"></i>
                        <h4>¿Qué ocurre?</h4>
                        <p>Dos placas se <span class="highlight">deslizan lateralmente</span> una respecto de la otra.</p>
                        <p style="margin-top:0.5rem;">No crean ni destruyen corteza, solo la <span class="highlight">desplazan</span>.</p>
                    </div>
                    <div class="card">
                        <i class="fas fa-waveform"></i>
                        <h4>Consecuencias</h4>
                        <ul>
                            <li>Generan <span class="highlight">sismicidad intensa</span>.</li>
                            <li>Formación de <span class="highlight">fallas geológicas</span>.</li>
                            <li>No hay actividad volcánica.</li>
                        </ul>
                    </div>
                </div>
                <div class="example-box">
                    <strong>Ejemplo:</strong> La <span class="highlight">Falla de San Andrés</span> en California (EE.UU.).
                </div>
            `
        },

        // === SLIDE 7: PRINCIPALES PLACAS ===
        {
            title: "🌍 Principales placas tectónicas",
            content: `
                <div class="badge">Lección 4 - Placas tectónicas</div>
                <h2>Las 15 placas tectónicas principales</h2>
                <div class="grid-3">
                    <div class="card">
                        <h4>Placas oceánicas</h4>
                        <ul>
                            <li>Placa del <span class="highlight">Pacífico</span></li>
                            <li>Placa de <span class="highlight">Nazca</span></li>

                            <li>Placa de <span class="highlight">Juan de Fuca</span></li>

                    </div>
                    <div class="card">

                        <ul>
                            <li>Placa <span class="highlight">Sudamericana</span></li>
                            <li>Placa <span class="highlight">Norteamericana</span></li>
                            <li>Placa <span class="highlight">Euroasiática</span></li>
                            <li>Placa <span class="highlight">Africana</span></li>
                            <li>Placa <span class="highlight">Indoaustraliana</span></li>
                            <li>Placa <span class="highlight">Antártica</span></li>
                        </ul>
                    </div>
                    <div class="card">
                        <h4>Otras placas</h4>
                        <ul>
                            <li>Placa del <span class="highlight">Caribe</span></li>
                            <li>Placa <span class="highlight">Filipina</span></li>
                            <li>Placa <span class="highlight">Arábiga</span></li>
                            <li>Placa de <span class="highlight">Scotia</span></li>
                        </ul>
                    </div>
                </div>
                <div class="info-box">
                    <i class="fas fa-lightbulb"></i> <strong>Chile:</strong> Está influenciado por la interacción entre la <span class="highlight">Placa de Nazca</span> y la <span class="highlight">Placa Sudamericana</span>.
                </div>
            `
        },

        // === SLIDE 8: CHILE Y EL CINTURÓN DE FUEGO ===
        {
            title: "🇨🇱 Chile en el Cinturón de Fuego",
            content: `
                <div class="badge">Lección 4 - Chile y la tectónica</div>
                <h2>Chile en el Cinturón de Fuego del Pacífico</h2>
                <div class="grid-2">
                    <div class="card">
                        <i class="fas fa-fire"></i>
                        <h4>¿Qué es el Cinturón de Fuego?</h4>
                        <p>Es una región con forma de herradura que rodea el Océano Pacífico. Concentra el <span class="highlight">90% de los sismos</span> y el <span class="highlight">75% de los volcanes activos</span> del mundo.</p>
                    </div>
                    <div class="card">
                        <i class="fas fa-map-marked-alt"></i>
                        <h4>Chile en el Cinturón</h4>
                        <p>Chile se encuentra en la <span class="highlight">zona de subducción</span> entre la Placa de Nazca y la Placa Sudamericana, lo que explica su alta actividad sísmica y volcánica.</p>
                    </div>
                </div>
                <div class="example-box">
                    <strong>Dato:</strong> El terremoto de <span class="highlight">Valdivia (1960)</span> con magnitud 9.5 es el más potente registrado en la historia.
                </div>

    // ================================================================
    // LÓGICA DE NAVEGACIÓN
    // ================================================================

    let currentSlide = 0;
    const totalSlides = slides.length;

    function renderSlides() {
        const wrapper = document.getElementById('slidesWrapper');
        wrapper.innerHTML = '';
        slides.forEach((slide, index) => {
            const div = document.createElement('div');
            div.className = 'slide';
            if (index === 0) div.classList.add('active');
            div.setAttribute('data-index', index);
            div.innerHTML = `
                ${slide.content}
                <div class="slide-number">${index + 1} / ${totalSlides}</div>
            `;
            wrapper.appendChild(div);
        });
        updateDots();
        updateButtons();
    }

    function updateDots() {
        const container = document.getElementById('dotsContainer');
        container.innerHTML = '';
        for (let i = 0; i < totalSlides; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            if (i === currentSlide) dot.classList.add('active');
            dot.addEventListener('click', () => goToSlide(i));
            container.appendChild(dot);
        }
    }

    function updateButtons() {
        document.getElementById('prevBtn').disabled = currentSlide === 0;
        document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
    }

    function goToSlide(index) {
        if (index < 0 || index >= totalSlides) return;
        currentSlide = index;
        const slidesElements = document.querySelectorAll('.slide');
        slidesElements.forEach((slide, i) => {
            slide.classList.toggle('active', i === currentSlide);
        });
        updateDots();
        updateButtons();
    }

    function nextSlide() {
        if (currentSlide < totalSlides - 1) goToSlide(currentSlide + 1);
    }

    function prevSlide() {
        if (currentSlide > 0) goToSlide(currentSlide - 1);
    }

    document.getElementById('prevBtn').addEventListener('click', prevSlide);
    document.getElementById('nextBtn').addEventListener('click', nextSlide);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') { e.preventDefault(); nextSlide(); }
        else if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
    });

    document.getElementById('cursoBtn').addEventListener('click', () => {
        window.location.href = 'Fisica.html';
    });

    document.getElementById('ejerciciosBtn').addEventListener('click', () => {
        window.location.href = 'C_5A_Fisica.html';
    });

    renderSlides();
</script>
